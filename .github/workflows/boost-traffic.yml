name: Boost Traffic

on:
  schedule:
    - cron: '*/10 * * * *'
  # 允許在 Actions 頁面手動觸發
  workflow_dispatch:

jobs:
  boost:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run traffic booster
        env:
          URL: ${{ secrets.URL }}
        run: node index.js
